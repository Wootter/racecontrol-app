<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>RaceLeague OBS Overlay</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:1920px;height:1080px;
  background:transparent;
  overflow:hidden;
   font-family:'Oxanium','Arial Black',Arial,sans-serif;
  color:#fff;
  user-select:none;
}

/* ── LEADERBOARD ── */
#leaderboard{
  position:absolute;
  top:40px;right:36px;
  width:300px;
  display:flex;flex-direction:column;gap:0;
}
#lb-header{
  background:linear-gradient(135deg,#0a0a14 0%,#111118 100%);
  border:1px solid rgba(255,255,255,0.08);
  border-bottom:2px solid #e10600;
  padding:8px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-radius:4px 4px 0 0;
}
#lb-flag-icon{font-size:20px;}
#lb-lap-info{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#fff;}
#lb-lap-num{font-size:20px;font-weight:900;color:#fff;}
#lb-lap-total{font-size:11px;color:rgba(255,255,255,0.5);font-weight:700;}
#lb-rows{display:flex;flex-direction:column;gap:1px;}
.lb-row{
  display:flex;align-items:center;gap:0;
  height:40px;
  background:rgba(8,8,16,0.88);
  border-left:1px solid rgba(255,255,255,0.05);
  border-right:1px solid rgba(255,255,255,0.05);
  transition:all 0.3s ease;
  overflow:hidden;
  position:relative;
}
.lb-row:last-child{border-radius:0 0 4px 4px;}
.lb-row.is-leader{border-left:3px solid #ffd600;}
.lb-row.in-pits{background:rgba(255,214,0,0.08);}
.lb-pos{
  width:34px;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:rgba(255,255,255,0.5);
  flex-shrink:0;
}
.lb-pos.p1{color:#ffd600;background:rgba(255,214,0,0.1);}
.lb-pos.p2{color:#c0c0c0;}
.lb-pos.p3{color:#cd7f32;}
.lb-logo{
  width:36px;height:100%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;padding:4px;
}
.lb-logo img{width:28px;height:28px;object-fit:contain;border-radius:2px;}
.lb-logo-placeholder{
  width:28px;height:28px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;font-weight:900;color:rgba(255,255,255,0.3);
}
.lb-info{flex:1;min-width:0;padding:0 6px;}
.lb-name{font-size:12px;font-weight:800;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-team{font-size:8px;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.lb-lap{font-size:9px;font-weight:700;color:rgba(255,255,255,0.6);padding-right:8px;text-align:right;flex-shrink:0;}
.lb-pit-badge{font-size:8px;color:#ffd600;padding-right:6px;}

/* ── FLAG BANNER ── */
#flag-banner{
  position:absolute;
  top:0;left:0;right:0;
  height:100px;
  display:flex;align-items:center;justify-content:center;
  transform:translateY(-110px);
  transition:transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
  z-index:100;
  pointer-events:none;
}
#flag-banner.show{transform:translateY(0);}
#flag-banner-inner{
  display:flex;align-items:center;gap:20px;
  padding:0 60px;height:80px;min-width:600px;
  border-bottom:4px solid;
  clip-path:polygon(20px 0%,calc(100% - 20px) 0%,100% 50%,calc(100% - 20px) 100%,20px 100%,0% 50%);
}
#flag-banner-inner.green {background:rgba(0,210,100,0.15);border-color:#00e676;}
#flag-banner-inner.yellow{background:rgba(255,200,0,0.15);border-color:#ffd600;}
#flag-banner-inner.red   {background:rgba(220,20,60,0.15); border-color:#ff1744;}
#flag-banner-inner.blue  {background:rgba(30,120,255,0.12);border-color:#2979ff;}
#flag-banner-inner.orange{background:rgba(255,100,0,0.15); border-color:#ff6d00;}
#flag-banner-inner.white {background:rgba(255,255,255,0.08);border-color:#fff;}
#flag-banner-emoji{font-size:44px;line-height:1;}
#flag-banner-text{display:flex;flex-direction:column;gap:2px;}
#flag-banner-title{font-size:28px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
#flag-banner-sub{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:0.75;}
#flag-banner-inner.green  #flag-banner-title{color:#00e676;}
#flag-banner-inner.yellow #flag-banner-title{color:#ffd600;}
#flag-banner-inner.red    #flag-banner-title{color:#ff4466;}
#flag-banner-inner.blue   #flag-banner-title{color:#5599ff;}
#flag-banner-inner.orange #flag-banner-title{color:#ff9933;}
#flag-banner-inner.white  #flag-banner-title{color:#fff;}

/* ── SC / VSC INDICATOR ── */
#sc-indicator{
  position:absolute;
  bottom:80px;left:36px;
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;
  background:rgba(255,100,0,0.12);
  border:2px solid #ff6d00;
  border-radius:6px;
  transform:translateX(-300px);
  transition:transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
  z-index:90;
}
#sc-indicator.show{transform:translateX(0);}
#sc-emoji{font-size:28px;}
#sc-text-wrap{}
#sc-title{font-size:16px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#ff6d00;}
#sc-sub{font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,0.5);margin-top:1px;}
@keyframes sc-pulse{0%,100%{border-color:#ff6d00;}50%{border-color:#ffaa44;}}
#sc-indicator.show{animation:sc-pulse 1.5s ease-in-out infinite;}

/* ── FASTEST LAP ── */
#fastest-lap{
  position:absolute;
  bottom:36px;left:36px;
  display:flex;align-items:center;gap:14px;
  padding:10px 20px 10px 16px;
  background:rgba(156,39,176,0.15);
  border:2px solid #9c27b0;
  border-radius:4px;
  transform:translateY(120px);
  transition:transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
  z-index:90;
  min-width:320px;
}
#fastest-lap.show{transform:translateY(0);}
#fl-icon{font-size:24px;}
#fl-label{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#ce93d8;}
#fl-driver{font-size:18px;font-weight:900;letter-spacing:1px;color:#fff;}
#fl-time{font-size:13px;font-weight:700;color:#ce93d8;font-variant-numeric:tabular-nums;}

/* ── FIA ANNOUNCEMENT ── */
#fia-announcement{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.85);
  opacity:0;
  transition:all 0.4s cubic-bezier(0.34,1.4,0.64,1);
  z-index:200;
  pointer-events:none;
  min-width:700px;max-width:1100px;
}
#fia-announcement.show{
  transform:translate(-50%,-50%) scale(1);
  opacity:1;
}
#fia-inner{
  background:rgba(6,6,14,0.96);
  border:2px solid rgba(255,255,255,0.15);
  border-top:4px solid #e10600;
  border-radius:6px;
  padding:28px 40px;
  text-align:center;
}
#fia-header{
  font-size:10px;font-weight:900;letter-spacing:4px;
  text-transform:uppercase;color:#e10600;margin-bottom:10px;
}
#fia-text{
  font-size:26px;font-weight:800;letter-spacing:1px;color:#fff;
  line-height:1.4;
}

/* ── HOLO FLAG ── */
@keyframes holo-border{
  0%{border-color:#ff0080;box-shadow:0 0 20px #ff008066;}
  16%{border-color:#ff8800;}
  33%{border-color:#ffff00;}
  50%{border-color:#00ff80;box-shadow:0 0 20px #00ff8066;}
  66%{border-color:#00ffff;}
  83%{border-color:#8800ff;}
  100%{border-color:#ff0080;box-shadow:0 0 20px #ff008066;}
}
@keyframes holo-text{
  0%{color:#ff0080;}16%{color:#ff8800;}33%{color:#ffff00;}
  50%{color:#00ff80;}66%{color:#00ffff;}83%{color:#8800ff;}100%{color:#ff0080;}
}
#flag-banner-inner.holo{
  animation:holo-border 3s linear infinite;
  background:rgba(255,0,128,0.08);
  border-width:3px;
}
#flag-banner-inner.holo #flag-banner-title{animation:holo-text 3s linear infinite;}

/* ── CONTROLS PANEL (hidden by default, shown with ?controls=1) ── */
#controls{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,10,20,0.97);
  border-top:2px solid rgba(255,255,255,0.1);
  padding:12px 20px;
  flex-wrap:wrap;gap:6px;
  z-index:9999;
  font-size:10px;
}
#controls.visible{display:flex;}
.ctrl-btn{
  padding:6px 14px;border-radius:4px;border:1px solid;
  font-family:'Oxanium',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  transition:opacity 0.15s;
}
.ctrl-btn:hover{opacity:0.75;}
.ctrl-btn.green {background:rgba(0,230,118,0.12);border-color:rgba(0,230,118,0.4);color:#00e676;}
.ctrl-btn.yellow{background:rgba(255,214,0,0.12);border-color:rgba(255,214,0,0.4);color:#ffd600;}
.ctrl-btn.red   {background:rgba(255,23,68,0.12); border-color:rgba(255,23,68,0.4);color:#ff1744;}
.ctrl-btn.blue  {background:rgba(41,121,255,0.12);border-color:rgba(41,121,255,0.4);color:#2979ff;}
.ctrl-btn.orange{background:rgba(255,109,0,0.12); border-color:rgba(255,109,0,0.4);color:#ff6d00;}
.ctrl-btn.purple{background:rgba(156,39,176,0.12);border-color:rgba(156,39,176,0.4);color:#ce93d8;}
.ctrl-btn.grey  {background:rgba(80,80,100,0.15); border-color:rgba(80,80,100,0.4);color:#aaa;}
.ctrl-sep{width:1px;height:28px;background:rgba(255,255,255,0.1);align-self:center;}
#ctrl-fia-input{
  padding:6px 10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);
  color:#fff;font-family:'Oxanium',sans-serif;font-size:11px;border-radius:4px;
  outline:none;min-width:260px;
}
</style>
</head>
<body>

<!-- LEADERBOARD -->
<div id="leaderboard">
  <div id="lb-header">
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="lb-flag-icon">🏁</span>
      <div id="lb-lap-info">LAP</div>
    </div>
    <div style="display:flex;align-items:baseline;gap:4px;">
      <div id="lb-lap-num">–</div>
      <div id="lb-lap-total">/–</div>
    </div>
  </div>
  <div id="lb-rows"></div>
</div>

<!-- FLAG BANNER -->
<div id="flag-banner">
  <div id="flag-banner-inner" class="green">
    <span id="flag-banner-emoji">🟢</span>
    <div id="flag-banner-text">
      <div id="flag-banner-title">Green Flag</div>
      <div id="flag-banner-sub">Race on — go go go!</div>
    </div>
  </div>
</div>

<!-- SC / VSC INDICATOR -->
<div id="sc-indicator">
  <span id="sc-emoji">🟠</span>
  <div id="sc-text-wrap">
    <div id="sc-title">Safety Car</div>
    <div id="sc-sub">Hold position — no overtaking</div>
  </div>
</div>

<!-- FASTEST LAP -->
<div id="fastest-lap">
  <span id="fl-icon">⚡</span>
  <div>
    <div id="fl-label">Fastest Lap</div>
    <div id="fl-driver">DRIVER</div>
  </div>
  <div id="fl-time" style="margin-left:auto;"></div>
</div>

<div id="fia-announcement">
  <div id="fia-inner">
    <div id="fia-header">🏛 FIA OFFICIAL ANNOUNCEMENT</div>
    <div id="fia-text">Announcement text here</div>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn green"  onclick="triggerFlag('green')">🟢 Green</button>
  <button class="ctrl-btn yellow" onclick="triggerFlag('yellow')">🟡 Yellow</button>
  <button class="ctrl-btn yellow" onclick="triggerFlag('yellow_s1')">🟡 S1</button>
  <button class="ctrl-btn yellow" onclick="triggerFlag('yellow_s2')">🟡 S2</button>
  <button class="ctrl-btn yellow" onclick="triggerFlag('yellow_s3')">🟡 S3</button>
  <button class="ctrl-btn yellow" onclick="triggerFlag('fcy')">🟡 FCY</button>
  <button class="ctrl-btn red"    onclick="triggerFlag('red')">🔴 Red</button>
  <button class="ctrl-btn blue"   onclick="triggerFlag('blue')">🔵 Blue</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn orange" onclick="triggerFlag('safety_car')">🟠 SC Deploy</button>
  <button class="ctrl-btn orange" onclick="triggerFlag('sc_ending')">🟠 SC Ending</button>
  <button class="ctrl-btn orange" onclick="triggerFlag('sc_speedup')">🟠 Speed Up</button>
  <button class="ctrl-btn orange" onclick="triggerFlag('sfl')">🟠 SFL</button>
  <button class="ctrl-btn orange" onclick="triggerFlag('vsc')">🔶 VSC</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn purple" onclick="showFastestLap()">⚡ Fastest Lap</button>
  <div class="ctrl-sep"></div>
  <input id="ctrl-fia-input" placeholder="FIA announcement text..." />
  <button class="ctrl-btn grey"   onclick="showFiaAnnouncement()">📢 Send FIA</button>
  <button class="ctrl-btn grey"   onclick="clearAll()">✕ Clear All</button>
</div>

function getTeamLogo(driverName){
  const team=DRIVER_TEAM[driverName];
  if(!team)return null;
  return LOGOS[team]||null;
}

function renderLeaderboard(data){
  const rows=document.getElementById('lb-rows');
  const lapNum=document.getElementById('lb-lap-num');
  const lapTot=document.getElementById('lb-lap-total');
  if(data.totalLaps){lapNum.textContent=data.drivers?.[0]?.lap||'–';lapTot.textContent='/'+data.totalLaps;}
  else{lapNum.textContent=data.drivers?.[0]?.lap||'–';lapTot.textContent='';}
  if(!data.drivers?.length){rows.innerHTML='';return;}
  rows.innerHTML=data.drivers.map((d,i)=>{
    const pos=i+1,pc=pos===1?'p1':pos===2?'p2':pos===3?'p3':'';
    const logo=getTeamLogo(d.name);
    const logoHtml=logo
      ?'<img src="'+logo+'" alt=""/>'
      :'<div class="lb-logo-placeholder">'+(DRIVER_TEAM[d.name]||'??')+'</div>';
    const pitBadge=d.inPits?'<span class="lb-pit-badge">🔧</span>':'';
    return '<div class="lb-row'+(pos===1?' is-leader':'')+(d.inPits?' in-pits':'')+'">'+
      '<div class="lb-pos '+pc+'">'+pos+'</div>'+
      '<div class="lb-logo">'+logoHtml+'</div>'+
      '<div class="lb-info">'+
        '<div class="lb-name">'+d.name+'</div>'+
        '<div class="lb-team">'+(DRIVER_INFO[d.name]?.callsign||'')+'</div>'+
      '</div>'+
      '<div style="display:flex;align-items:center;">'+
      pitBadge+
      '<div class="lb-lap">Lap '+(d.lap||1)+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function showFlag(flag, customData){
  if(flag==='__custom__'&&customData){
    const banner=document.getElementById('flag-banner');
    const inner=document.getElementById('flag-banner-inner');
    const isHolo=customData.color==='holographic'||customData.color==='rainbow';
    inner.className=isHolo?'holo':'';
    if(!isHolo&&customData.color?.startsWith('#')){
      inner.style.background=customData.color+'22';
      inner.style.borderColor=customData.color;
      inner.style.setProperty('--c',customData.color);
    }else{inner.style.cssText='';}
    document.getElementById('flag-banner-emoji').textContent=customData.emoji||'🏴';
    document.getElementById('flag-banner-title').textContent=customData.text||'Custom Flag';
    document.getElementById('flag-banner-title').style.color=isHolo?'':(customData.color?.startsWith('#')?customData.color:'');
    document.getElementById('flag-banner-sub').textContent='';
    banner.classList.add('show');
    clearTimeout(flagTimeout);
    if(!customData.persistent)flagTimeout=setTimeout(()=>banner.classList.remove('show'),8000);
    return;
  }
  const def=FLAG_DEFS[flag];if(!def)return;
  const banner=document.getElementById('flag-banner');
  const inner=document.getElementById('flag-banner-inner');
  inner.className=def.color;
  inner.style.cssText='';
  document.getElementById('flag-banner-emoji').textContent=def.emoji;
  document.getElementById('flag-banner-title').textContent=def.title;
  document.getElementById('flag-banner-sub').textContent=def.sub;
  banner.classList.add('show');
  clearTimeout(flagTimeout);
  if(def.persistent){
    document.getElementById('sc-title').textContent=def.scTitle||def.title;
    document.getElementById('sc-sub').textContent=def.scSub||def.sub;
    document.getElementById('sc-emoji').textContent=def.emoji;
    document.getElementById('sc-indicator').classList.add('show');
    currentSC=true;
    flagTimeout=setTimeout(()=>banner.classList.remove('show'),5000);
  } else {
    if(flag==='green'&&currentSC){
      document.getElementById('sc-indicator').classList.remove('show');
      currentSC=false;
    }
    flagTimeout=setTimeout(()=>banner.classList.remove('show'),8000);
  }
}

function showFastestLap(driver, time){
  driver=driver||'LAMAR';time=time||'1:23.456';
  const logo=getTeamLogo(driver);
  document.getElementById('fl-driver').textContent=driver;
  document.getElementById('fl-time').textContent=time;
  document.getElementById('fastest-lap').classList.add('show');
  clearTimeout(flTimeout);
  flTimeout=setTimeout(()=>document.getElementById('fastest-lap').classList.remove('show'),8000);
}

function showFiaAnnouncement(text){
  text=text||document.getElementById('ctrl-fia-input')?.value||'Official Announcement';
  document.getElementById('fia-text').textContent=text;
  document.getElementById('fia-announcement').classList.add('show');
  clearTimeout(fiaTimeout);
  fiaTimeout=setTimeout(()=>document.getElementById('fia-announcement').classList.remove('show'),12000);
}

function clearAll(){
  document.getElementById('flag-banner').classList.remove('show');
  document.getElementById('sc-indicator').classList.remove('show');
  document.getElementById('fastest-lap').classList.remove('show');
  document.getElementById('fia-announcement').classList.remove('show');
  currentSC=false;
  clearTimeout(flagTimeout);clearTimeout(fiaTimeout);clearTimeout(flTimeout);
}

function triggerFlag(f){showFlag(f,null);}

// ── SSE + POLLING ──
let apiUrl = '';
let pollInterval = null;
let sseSource = null;
let lastFlagTs = null;
let retryCount = 0;
const MAX_RETRIES = 999;

async function fetchApiUrl() {
  try {
    const r = await fetch('https://api.github.com/gists/746339b1b2924446563e6349ef89ce8a');
    const d = await r.json();
    const f = d.files?.['racecontrol-api.json'];
    if (f) return JSON.parse(f.content).url || null;
  } catch (e) { console.warn('[Overlay] Gist fetch failed', e); }
  return null;
}

function connectSSE(url) {
  if (sseSource) { sseSource.close(); sseSource = null; }
  try {
    sseSource = new EventSource(url + '/events');
    sseSource.addEventListener('flag', e => {
      try { const d = JSON.parse(e.data); showFlag(d.flag, d); } catch {}
    });
    sseSource.onopen = () => { retryCount = 0; console.log('[Overlay] SSE connected'); };
    sseSource.onerror = () => {
      console.warn('[Overlay] SSE error, will rely on polling');
    };
  } catch (e) { console.warn('[Overlay] SSE setup failed', e); }
}

async function poll() {
  if (!apiUrl) return;
  try {
    const r = await fetch(apiUrl + '/driver/state', { cache: 'no-store' });
    if (!r.ok) return;
    const d = await r.json();
    renderLeaderboard(d);
    if (d.currentFlag?.timestamp && d.currentFlag.timestamp !== lastFlagTs) {
      lastFlagTs = d.currentFlag.timestamp;
      showFlag(d.currentFlag.flag, d.currentFlag);
    }
    retryCount = 0; 
  } catch (e) {
    retryCount++;
    console.warn('[Overlay] Poll failed attempt', retryCount);
  }
}

async function startPolling(url) {
  apiUrl = url;
  console.log('[Overlay] Connecting to', url);
  connectSSE(url);
  poll(); 
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(poll, 2000); 
}

async function resolveApiUrl() {
  const params = new URLSearchParams(location.search);
  const apiOverride = params.get('api');
  if (apiOverride) return apiOverride;
  for (let i = 0; i < 10; i++) {
    const url = await fetchApiUrl();
    if (url) return url;
    const wait = Math.min(3000 * (i + 1), 15000);
    console.warn('[Overlay] Gist attempt', i + 1, 'failed, retrying in', wait / 1000, 's');
    await new Promise(r => setTimeout(r, wait));
  }
  return null;
}

function dbg(msg){ 
  const d = document.getElementById('debug');
  if(d){ d.innerHTML += msg + '<br>'; console.log('[OBS]', msg); }
}

(async()=>{
  const params = new URLSearchParams(location.search);
  if(params.get('controls')==='1') document.getElementById('controls').classList.add('visible');

  dbg('🚀 Overlay starting...');

  const apiOverride = params.get('api');
  let url = apiOverride || null;

  if(!url){
    dbg('📡 Fetching Gist...');
    for(let i = 0; i < 10; i++){
      try{
        const r = await fetch('https://api.github.com/gists/746339b1b2924446563e6349ef89ce8a', {cache:'no-store'});
        const d = await r.json();
        const f = d.files?.['racecontrol-api.json'];
        if(f){ url = JSON.parse(f.content).url; dbg('✅ Gist URL: ' + url); break; }
        else dbg('⚠️ Gist file missing');
      } catch(e){ dbg('❌ Gist attempt '+(i+1)+' failed: '+e.message); }
      await new Promise(r=>setTimeout(r, 3000));
    }
  }

  if(!url){ dbg('💀 No API URL found after all attempts'); return; }

  dbg('🔌 Connecting to API...');
  
  // SSE
  try{
    const evt = new EventSource(url+'/events');
    evt.onopen = ()=>dbg('✅ SSE connected');
    evt.onerror = ()=>dbg('⚠️ SSE error (polling will cover)');
    evt.addEventListener('flag', e=>{
      try{ const d=JSON.parse(e.data); showFlag(d.flag,d); }catch{}
    });
  } catch(e){ dbg('❌ SSE failed: '+e.message); }

  // Poll
  async function poll(){
    try{
      const r = await fetch(url+'/driver/state?_=' + Date.now(), {cache:'no-store'});
      if(!r.ok){ dbg('⚠️ Poll HTTP '+r.status); return; }
      const d = await r.json();
      dbg('📊 Poll OK — '+( d.drivers?.length||0)+' drivers');
      renderLeaderboard(d);
      if(d.currentFlag?.timestamp && d.currentFlag.timestamp !== lastFlagTs){
        lastFlagTs = d.currentFlag.timestamp;
        showFlag(d.currentFlag.flag, d.currentFlag);
      }
      // Hide debug after first successful poll
      setTimeout(()=>{ const el=document.getElementById('debug'); if(el) el.style.display='none'; }, 5000);
    } catch(e){ dbg('❌ Poll error: '+e.message); }
  }

  poll();
  setInterval(poll, 2000);

  if(params.get('demo')==='1'){
    renderLeaderboard({
      totalLaps:58,
      drivers:[
        {name:'LAMAR',lap:7},{name:'CODA',lap:7},{name:'SWEATER',lap:7},
        {name:'ACHILLES',lap:6},{name:'KEBAB',lap:6},{name:'SUPA',lap:6},
        {name:'QUAH',lap:6},{name:'HIDDEN',lap:6},{name:'AUBRN',lap:5},{name:'UNLIMITED',lap:5},
      ]
    });
  }
})();
</script>
