<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RaceLeague Control</title>
        <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&display=swap" rel="stylesheet" />
        <link href="styles.css" rel="stylesheet" />
        
    </head>
    <body>
        <!-- Title Bar -->
        <div class="titlebar">
            <!-- Left side of the title bar -->
            <div class="titlebar-left">
                <div class="tl-logo"><nav_title>Race<span>Control</span></nav_title></div>
                <badge class="tl-badge" id="mode-badge" style="display:none;"></badge>
                <!-- Person roles -->
                <div id="panel-switcher">
                    <button class="switch-btn" id="sw-driver" onclick="switchPanel('driver')"><badge>🏎️ Driver</badge></button>
                    <button class="switch-btn" id="sw-marshal" onclick="switchPanel('marshal')"><badge>🏁 Marshal 🔒</badge></button>
                    <button class="switch-btn" id="sw-dev" onclick="switchPanel('dev')" style="display:none;"><badge>⚙️ Dev</badge></button>
                </div>
            <!-- Rest of the title bar -->
            </div> 
                <!-- Nav buttons -->
                <div class="tb-btns"> 
                    <button class="tb-btn" title="Settings" onclick="switchPanel('settings')"><icon>⚙</icon></button>
                    <button class="tb-btn" title="Report Bug" onclick="openBugReport()"><icon>🐛</icon></button>
                    <button class="tb-btn" title="Pin" id="top-btn" onclick="toggleTop()"><icon>📌</icon></button>
                    <button class="tb-btn" title="Minimize" onclick="window.api.minimize()"><icon>─</icon></button>
                    <button class="tb-btn close-btn" title="Quit" onclick="window.api.close()"><icon>✕</icon></button>
                </div>
        </div>
        <!-- LOGIN -->
        <div class="screen active screen-login" id="screen-login">
            <div class="login-logo"><login_title>Race<span>Control</span></login_title></div>
            <div><h1>Race Management System</h1></div>
            <div class="login-card">
                <div><h3>Sign in to continue</h3></div>
                <button class="discord-btn" id="btn-discord-login">
                    <!-- Discord Logo SVG -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff">
                    <path
                        d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" />
                    </svg>
                    <dc-title>Login with Discord</dc-title>
                </button>
                <!-- API URL Display & Change -->
                <div id="api-url-display" style="display:none;"></div>
                <button class="change-url-btn" id="change-url-btn" onclick="resetApiUrl()"><h4>Change API URL</h4></button>
                <div class="login-error" id="login-error"></div>
            </div>
        </div>

        <!-- PASSWORD -->
        <div class="screen" id="screen-password" style="align-items:center;justify-content:center;gap:14px;padding:24px;">
            <div class="login-logo"><login_title>Race<span>Control</span></login_title></div>
            <!-- Password Card -->
            <div class="pw-card">
                <div><h3>Marshal Authentication</h3></div>
                <div class="user-pill">
                    <img id="pw-avatar" src=""/>
                    <div>
                    <div class="uname" id="pw-username"></div>
                    <div class="vrfd">✓ Discord verified</div>
                    </div>
                </div>
                <!-- Password Input -->
                <input type="password" id="pw-input" placeholder="Enter marshal password" />
                <button class="pw-btn" onclick="submitPassword()"><h2>Enter →</h2></button>
                <div class="pw-error" id="pw-error"><h3></h3></div>
            </div>
        </div>

        <!-- Functions -->
        <script src="functions.js"></script>
    </body>
</html>
